<!DOCTYPE html>
{% load static %}
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AboutEverything</title>
    <link href="{% static 'main_app/css/main_page.css' %}" rel="stylesheet">
</head>
<body>
    <header class="top-panel">
    <div class="logo">AboutEverything</div>
    <nav class="nav-links">
        <a href="{% url 'posts' %}" style="text-decoration: none;">Main</a>
        <a href="{% url 'add_post' %}" style="text-decoration: none;">Add Post</a>
        <a href="" style="text-decoration: none;">Rules</a>
        <a href="" style="text-decoration: none;">About Us</a>
        <a href="{% url 'profile' user_id %}" style="text-decoration: none;">Profile</a>
        <a href="{% url 'logout' %}" style="text-decoration: none;">Logout</a>
    </nav>
    </header>
    <aside>
        <ul>
          {% for category in categories %}
            <li><a href="{% url 'category_filter' category.slug_name %}" style="text-decoration: none;">{{ category.category_name }}</a></li>
          {% endfor %}
        </ul>
    </aside>
    <main>
        <form action="{% url 'posts' %}" method="get">
            <input type="search" name="search" placeholder="Search..." required>
            <button type="submit">Search</button>
        </form>
        {% if posts %}
            {% for post in posts %}
                <a class="post-card" href="{% url 'show_post' post.id %}" style="text-decoration: none;">
                    <div class="post-title">
                        <label>{{ post.title }}</label>
                    </div>
                    <div class="post-author">
                        <label>{{ post.author_id.user_name }}</label>
                    </div>
                    <div class="post-date">
                        <label>{{ post.posted_at }}</label>
                    </div>
                </a>
            {% endfor %}
        {% else %}
            <h2>Posts have not been added yet...</h2>
        {% endif %}
    </main>
</body>
</html>
